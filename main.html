<!DOCTYPE html>
<html>
<head>
    <title>Car Insurance Registration Form</title>
</head>
<body>

<h2>Car Insurance Registration Form</h2>

<form method="POST">

    <label for="name">Name</label><br>
    <input type="text" id="name" required>
    <br><br>

    <label for="email">Email</label><br>
    <input type="email" id="email" required>
    <br><br>

    <label>Gender</label><br>
    <input type="radio" id="male" name="gender" required>
    <label for="male">Male</label>

    <input type="radio" id="female" name="gender">
    <label for="female">Female</label>
    <br><br>

    <label for="cars">Car Brands</label><br>
    <select id="cars">
        <option>BMW</option>
        <option>Audi</option>
        <option>Mercedez</option>
    </select>
    <br><br>

    <label for="carage">Car Age</label><br>
    <input type="number" id="carage" required>
    <br><br>

    <label for="dop">Date of Purchase</label><br>
    <input type="date" id="dop" required>
    <br><br>

    <label for="password">Password</label><br>
    <input type="password" id="password" required>
    <br><br>

    <button type="submit">Submit</button>

</form>

</body>
</html>
